<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Akun</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Background gradasi warm peach/krem */
            background: linear-gradient(135deg, #fff5f5 0%, #fde8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(159, 18, 57, 0.1);
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            transition: transform 0.3s ease;
        }
        .register-card:hover {
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #e11d48; /* Warna border Crimson */
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
            color: #1e293b;
        }
        .form-label {
            color: #475569;
            letter-spacing: 0.3px;
        }
        .btn-success {
            /* Warna tombol diubah ke Crimson Red gradient */
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .btn-success:hover, .btn-success:focus {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }
        .btn-success:active {
            transform: translateY(1px);
        }
        a {
            color: #e11d48; /* Link warna Crimson */
            transition: color 0.2s ease;
        }
        a:hover {
            color: #9f1239;
        }
    </style>
</head>
<body>

<div class="card register-card p-4">
    <div class="card-body">
        <h3 class="text-center fw-bold text-dark mb-2">Daftar Akun</h3>
        <p class="text-center text-muted small mb-4">Lengkapi data di bawah untuk membuat akun baru</p>

        <form th:action="@{/register}" th:object="${request}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="username" class="form-label small fw-bold">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Username" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label small fw-bold">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Password" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="nama" class="form-label small fw-bold">Nama Lengkap</label>
                <input type="text" id="nama" th:field="*{nama}" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="mb-4">
                <label for="alamat" class="form-label small fw-bold">Alamat</label>
                <textarea id="alamat" th:field="*{alamat}" class="form-control" rows="3" placeholder="Masukkan alamat lengkap" required></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Daftar Akun</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Sudah punya akun? <a th:href="@{/login}" class="text-decoration-none fw-bold">Login di sini</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
