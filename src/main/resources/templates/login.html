<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Informasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fde8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(159, 18, 57, 0.1);
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #e11d48;
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
            color: #1e293b;
        }
        .form-label {
            color: #475569;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .btn-primary:hover, .btn-primary:focus {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }
        .btn-primary:active {
            transform: translateY(1px);
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
        /* Penyesuaian warna notifikasi agar serasi dengan merah */
        .alert-danger {
            background-color: #475569; /* Gelap kontras */
            color: #f8fafc;
        }
        .alert-success {
            background-color: #fff1f2;
            color: #be123c;
            border: 1px solid #fecdd3;
        }
        a {
            color: #e11d48;
            transition: color 0.2s ease;
        }
        a:hover {
            color: #9f1239;
        }
    </style>
</head>
<body>

<div class="card login-card p-4">
    <div class="card-body">
        <h3 class="text-center fw-bold text-dark mb-2">Selamat Datang</h3>
        <p class="text-center text-muted small mb-4">Silakan masuk menggunakan akun Anda</p>

        <div th:if="${param.error}" class="alert alert-danger text-center small p-2" role="alert">
            Username atau password salah!
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-center small p-2" role="alert">
            Anda telah berhasil logout.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold">Username</label>
                <input type="text" id="username" name="username" class="form-placeholder form-control" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Masuk</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Belum punya akun? <a th:href="@{/register}" class="text-decoration-none fw-bold">Daftar Sekarang</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
