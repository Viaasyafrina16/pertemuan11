<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fde8e8 100%);
            min-height: 100vh;
        }
        .navbar {
            background: #ffffff !important;
            box-shadow: 0 4px 20px rgba(159, 18, 57, 0.05) !important;
            border-bottom: 1px solid #ffe4e6;
            padding: 15px 0;
        }
        .navbar-brand {
            color: #1e293b !important;
            font-weight: 700 !important;
            letter-spacing: -0.5px;
        }
        /* Tombol Logout dibuat netral (Dark Slate) agar elegan */
        .btn-outline-light {
            color: #475569 !important;
            border-color: #cbd5e1 !important;
            background-color: #f8fafc;
            font-weight: 600;
            border-radius: 8px;
            padding: 6px 16px;
            transition: all 0.2s ease;
        }
        .btn-outline-light:hover {
            color: #ffffff !important;
            background-color: #334155 !important;
            border-color: #334155 !important;
            box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2);
        }
        .dashboard-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(159, 18, 57, 0.08);
            background: #ffffff;
            overflow: hidden;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            /* Avatar menggunakan tema Crimson/Ruby */
            background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
            color: white;
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(225, 29, 72, 0.25);
            border: 4px solid #ffffff;
        }
        hr {
            border-top: 1.5px dashed #fecdd3;
            opacity: 1;
            margin: 25px 0;
        }
        .info-label {
            color: #94a3b8 !important;
            font-weight: 700 !important;
            font-size: 0.75rem !important;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }
        .info-value {
            color: #1e293b !important;
            font-weight: 500;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="#">Sistem Informasi</a>
        <div class="ms-auto">
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card dashboard-card p-4">
                <div class="card-body text-center">
                    <div class="d-flex justify-content-center">
                        <div class="profile-avatar" th:text="${#strings.substring(profile.nama,0,1).toUpperCase()}">U</div>
                    </div>
                    <h3 class="card-title mb-1 fw-bold text-dark" th:text="${profile.nama}">Nama Lengkap</h3>
                    <p class="text-muted mb-4 small fw-medium">@<span th:text="${user.username}">username</span></p>

                    <hr>

                    <div class="text-start mt-2 px-2">
                        <div class="mb-3">
                            <label class="text-muted d-block small text-uppercase fw-bold info-label">Username Akun</label>
                            <span class="fs-6 info-value" th:text="${user.username}">-</span>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted d-block small text-uppercase fw-bold info-label">Nama Lengkap</label>
                            <span class="fs-6 info-value" th:text="${profile.nama}">-</span>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted d-block small text-uppercase fw-bold info-label">Alamat Tinggal</label>
                            <span class="fs-6 info-value" th:text="${profile.alamat}">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
